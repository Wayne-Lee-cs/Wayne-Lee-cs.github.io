<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · Juyang Li</title>
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; manifest-src 'self'; object-src 'none'; upgrade-insecure-requests">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/website_head_page.jpg" type="image/jpeg">
    <style>
        .page-404 {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 40px 20px;
        }
        .page-404 h1 {
            font-family: Georgia, serif; font-size: 120px; font-weight: 400;
            color: var(--color-accent, #c8956c); line-height: 1; margin-bottom: 16px;
        }
        .page-404 p { font-size: 18px; color: var(--color-text-secondary, #6b6560); margin-bottom: 32px; }
        .page-404 a {
            display: inline-block; padding: 14px 32px; background: var(--color-text, #191919);
            color: var(--color-text-inverse, #faf9f7); border-radius: 8px; font-size: 15px;
            font-weight: 500; transition: background 0.25s, transform 0.25s; text-decoration: none;
        }
        .page-404 a:hover { background: #333; transform: translateY(-1px); }
    </style>
</head>
<body>
    <script>
    (function(){
        var t = localStorage.getItem('theme');
        if (t) {
            document.documentElement.setAttribute('data-theme', t);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
    </script>
    <div class="page-404">
        <div>
            <h1>404</h1>
            <p>This page doesn't exist. Maybe it was moved or you mistyped the URL.</p>
            <a href="/">Back to Home</a>
        </div>
    </div>
</body>
</html>
