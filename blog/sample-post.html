<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://avatars.githubusercontent.com https://github.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; manifest-src 'self'; object-src 'none'; upgrade-insecure-requests">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    <title>第一篇博客：Hello World · Juyang Li</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="icon" href="../website_head_page.jpg" type="image/jpeg">
    <style>
        .article { max-width: 720px; margin: 0 auto; padding: 120px 24px 80px; }
        .article-back {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 14px; color: var(--color-accent, #c8956c);
            margin-bottom: 40px; text-decoration: none;
        }
        .article-back:hover { text-decoration: underline; }
        .article-meta { font-size: 13px; color: var(--color-text-light, #9b9590); margin-bottom: 32px; }
        .article h1 { font-family: var(--font-serif, Georgia, serif); font-size: 36px; font-weight: 400; margin-bottom: 16px; letter-spacing: -0.02em; }
        .article-content { font-size: 16px; line-height: 1.85; color: var(--color-text-secondary, #5c5650); }
        .article-content p { margin-bottom: 20px; }
        .article-content h2 { font-size: 22px; font-weight: 600; margin: 40px 0 16px; color: var(--color-text, #1a1a1a); }
        .article-content code { background: #f0ede8; padding: 2px 6px; border-radius: 4px; font-size: 14px; }
        .article-content pre { background: #1a1a1a; color: #e0d8cf; padding: 20px; border-radius: 12px; overflow-x: auto; margin: 20px 0; font-size: 14px; line-height: 1.6; }
        [data-theme="dark"] .article { color: #9b9590; }
        [data-theme="dark"] .article h1 { color: #e8e4df; }
        [data-theme="dark"] .article-content h2 { color: #e8e4df; }
        [data-theme="dark"] .article-content code { background: #2a2a2a; color: #d4a574; }
        [data-theme="dark"] .article-back { color: #c8956c; }
    </style>
</head>
<body>
    <script>
    (function(){
        var t = localStorage.getItem('theme');
        if (t) {
            document.documentElement.setAttribute('data-theme', t);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
    </script>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">Juyang Li</a>
            <div class="nav-actions">
                <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <article class="article">
        <a href="../index.html#blog" class="article-back">← Back to Blog</a>
        <h1>第一篇博客：Hello World</h1>
        <div class="article-meta">2026-03-29 · Getting Started</div>
        <div class="article-content">
            <p>这是一篇示例博客文章。你可以在这里写任何内容：学习笔记、技术分享、研究心得等。</p>
            <h2>如何写博客</h2>
            <p>复制 <code>blog/_template.html</code> 文件，重命名后编辑内容即可。</p>
            <p>写完后在 <code>index.html</code> 的 blog-grid 里添加一个新的 blog-card 链接到你的文章。</p>
        </div>
    </article>
    <script src="../script.js" defer></script>
</body>
</html>
