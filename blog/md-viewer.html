<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://avatars.githubusercontent.com https://github.com https:; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; manifest-src 'self'; object-src 'none'; upgrade-insecure-requests">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    <title>Blog · Juyang Li</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="icon" href="../website_head_page.jpg" type="image/jpeg">
    <style>
        .article { max-width: 780px; margin: 0 auto; padding: 120px 24px 80px; }
        .article-back {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 14px; color: var(--color-accent, #c8956c);
            margin-bottom: 40px; text-decoration: none;
        }
        .article-back:hover { text-decoration: underline; }
        .loading { text-align: center; padding: 60px 0; color: var(--color-text-light, #9b9590); font-size: 15px; }
        .error { text-align: center; padding: 60px 0; color: #c0392b; font-size: 15px; }

        /* Markdown rendered content */
        .md-content { font-size: 16px; line-height: 1.85; color: var(--color-text-secondary, #5c5650); }
        .md-content h1 { font-family: Georgia, serif; font-size: 36px; font-weight: 400; margin: 0 0 16px; letter-spacing: -0.02em; color: var(--color-text, #1a1a1a); }
        .md-content h2 { font-size: 24px; font-weight: 600; margin: 48px 0 16px; color: var(--color-text, #1a1a1a); padding-bottom: 8px; border-bottom: 1px solid var(--color-border, #e8e4df); }
        .md-content h3 { font-size: 20px; font-weight: 600; margin: 32px 0 12px; color: var(--color-text, #1a1a1a); }
        .md-content p { margin-bottom: 20px; }
        .md-content a { color: var(--color-accent, #c8956c); text-decoration: underline; text-underline-offset: 3px; }
        .md-content a:hover { color: #b07a52; }
        .md-content code { background: #f0ede8; padding: 2px 6px; border-radius: 4px; font-size: 14px; font-family: 'Consolas', 'Monaco', monospace; }
        .md-content pre { background: #1a1a1a; color: #e0d8cf; padding: 20px; border-radius: 12px; overflow-x: auto; margin: 24px 0; font-size: 14px; line-height: 1.6; }
        .md-content pre code { background: none; padding: 0; color: inherit; }
        .md-content img { max-width: 100%; border-radius: 12px; margin: 24px 0; display: block; }
        .md-content blockquote { border-left: 3px solid var(--color-accent, #c8956c); margin: 24px 0; padding: 12px 20px; background: rgba(200,149,108,0.05); border-radius: 0 8px 8px 0; }
        .md-content blockquote p { margin-bottom: 0; color: var(--color-text-secondary, #6b6560); }
        .md-content ul, .md-content ol { margin: 16px 0; padding-left: 24px; }
        .md-content li { margin-bottom: 8px; }
        .md-content .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 24px 0; }
        .md-content table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 400px; }
        .md-content th, .md-content td { padding: 10px 14px; border: 1px solid var(--color-border, #e8e4df); text-align: left; }
        .md-content th { background: #f5f3f0; font-weight: 600; }
        .md-content hr { border: none; border-top: 1px solid var(--color-border, #e8e4df); margin: 40px 0; }

        /* Dark mode for blog content */
        [data-theme="dark"] .md-content { color: #9b9590; }
        [data-theme="dark"] .md-content h1,
        [data-theme="dark"] .md-content h2,
        [data-theme="dark"] .md-content h3 { color: #e8e4df; }
        [data-theme="dark"] .md-content code { background: #2a2a2a; color: #d4a574; }
        [data-theme="dark"] .md-content blockquote { background: rgba(200,149,108,0.08); }
        [data-theme="dark"] .md-content th { background: #1e1e1e; color: #e8e4df; }
        [data-theme="dark"] .md-content td { border-color: rgba(255,255,255,0.1); }
        [data-theme="dark"] .md-content th { border-color: rgba(255,255,255,0.1); }
        [data-theme="dark"] .md-content h2 { border-bottom-color: rgba(255,255,255,0.1); }
        [data-theme="dark"] .article-back { color: #c8956c; }
        [data-theme="dark"] .loading { color: #6b6560; }
        @media (max-width: 480px) {
            .article { padding: 80px 16px 40px; }
            .md-content h1 { font-size: 26px; }
            .md-content h2 { font-size: 20px; margin: 32px 0 12px; }
            .md-content pre { padding: 14px; font-size: 13px; }
            .md-content table { font-size: 12px; }
            .md-content th, .md-content td { padding: 6px 8px; }
        }
    </style>
</head>
<body>
    <script>
    (function(){
        var t = localStorage.getItem('theme');
        if (t) {
            document.documentElement.setAttribute('data-theme', t);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
    </script>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">Juyang Li</a>
            <div class="nav-actions">
                <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <article class="article">
        <a href="../index.html#blog" class="article-back">← Back to Blog</a>
        <div id="content" class="loading">Loading...</div>
    </article>

    <script>
    // Theme toggle for blog pages
    var themeBtn = document.querySelector('.theme-toggle');
    if (themeBtn) {
        themeBtn.addEventListener('click', function() {
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.5/dist/purify.min.js" crossorigin="anonymous"></script>
    <script src="md-viewer.js"></script>
</body>
</html>
